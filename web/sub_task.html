<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子任务详情</title>
    <link rel="stylesheet" href="/db-archive/static/style.css">
    <script defer src="/db-archive/static/alpinejs.min.js"></script>
</head>
<body x-data="subTaskApp">
<div class="header">
    <div class="logo">子任务详情</div>
</div>

<div class="container">
    <div class="toolbar">
        <div class="toolbar-left" style="display: flex; gap: 12px; align-items: center; flex: 1;">
            <div id="filter-tag-wrap">
                <div class="link-filter-tag">
                    <span x-text="`Task ID: ${taskId}`"></span>
                </div>
            </div>

            <div style="display: flex; align-items: center; gap: 4px;">
                <span style="font-size: 13px; color: var(--text-regular);">状态:</span>
                <select x-model="execPhase" class="search-input" style="width: 120px;">
                    <option value="">全部</option>
                    <option value="pending">pending</option>
                    <option value="running">running</option>
                    <option value="completed">completed</option>
                    <option value="failed">failed</option>
                    <option value="paused">paused</option>
                </select>
            </div>

            <input type="text" class="search-input" placeholder="模糊搜索..." x-model="filterText">
            <button class="btn primary refresh-btn" :class="{ refreshing: isRefreshing }" @click="refreshCurrentPage()">
                <span>刷新</span>
            </button>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <template x-for="col in columns">
                    <th x-text="col.label"></th>
                </template>
            </tr>
            </thead>
            <tbody>
            <template x-for="row in pagedData()" :key="row.id">
                <tr>
                    <template x-for="col in columns">
                        <td x-html="formatCell(row, col)"></td>
                    </template>
                </tr>
            </template>
            </tbody>
        </table>
        <div class="pagination">
            <div class="page-info" x-text="`共 ${totalItems()} 条记录`"></div>
            <button class="page-btn" :disabled="page <= 1" @click="page--">&lt;</button>
            <template x-for="p in totalPages()">
                <button class="page-btn" :class="{ active: p === page }" @click="page = p" x-text="p"></button>
            </template>
            <button class="page-btn" :disabled="page >= totalPages()" @click="page++">&gt;</button>
        </div>
    </div>
</div>

<div class="toast-container"></div>
<script src="/db-archive/static/config.js"></script>
<script src="/db-archive/static/sub_task.js"></script>
</body>
</html>
